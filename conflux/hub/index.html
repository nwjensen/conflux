<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conflux — Family Status</title>
  <!-- Leaflet is vendored, not loaded from a CDN: the hub must work with no
       internet. Tiles come from Conflux's caching proxy for the same reason. -->
  <link rel="stylesheet" href="/hub/vendor/leaflet.css" />
  <link rel="stylesheet" href="/hub/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="brand">CONFLUX</div>
      <div class="subtitle">Family Status</div>
    </div>
    <div class="topbar-right">
      <button class="manage" id="manageBtn" title="Edit family profiles">⚙ Manage</button>
      <div class="updated" id="lastRefreshed">—</div>
    </div>
  </header>

  <main>
    <!-- Home: one card per subject -->
    <section id="home" class="grid" aria-label="Family status"></section>

    <!-- Detail drawer for a selected subject -->
    <section id="detail" class="detail hidden" aria-label="Subject detail">
      <button class="back" id="backBtn">&larr; Back to everyone</button>
      <!-- Head and body are rewritten on every poll; the map block sits between
           them and persists, so panning/zooming survives a refresh. -->
      <div id="detailHead"></div>
      <div class="block map-block" id="mapBlock">
        <h3>Observed positions</h3>
        <div id="map" class="map"></div>
        <div class="map-empty hidden" id="mapEmpty">No position reports received.</div>
        <div class="note" id="mapNote"></div>
      </div>
      <div id="detailBody"></div>
    </section>
  </main>

  <!-- Override dialog (operator only, PIN protected) -->
  <dialog id="overrideDialog">
    <form method="dialog" id="overrideForm">
      <h3>Override status — <span id="ovName"></span></h3>
      <label>Set status
        <select id="ovState">
          <option value="OK">🟢 OK</option>
          <option value="DELAYED">🟡 Delayed</option>
          <option value="NEED_CONTACT">🟠 Need Contact</option>
          <option value="NEED_HELP">🔴 Need Help</option>
          <option value="EMERGENCY">🚨 Emergency</option>
        </select>
      </label>
      <label>Operator PIN
        <input type="password" id="ovPin" inputmode="numeric" autocomplete="off" />
      </label>
      <label class="checkbox">
        <input type="checkbox" id="ovImmediate" /> Send messages now (bypass schedule)
      </label>
      <p class="warn" id="ovWarn">This will send messages now.</p>
      <menu>
        <button value="cancel" type="submit">Cancel</button>
        <button value="ok" id="ovApply" class="primary" type="submit">Apply</button>
      </menu>
    </form>
  </dialog>

  <!-- Manage profiles dialog (edit name + APRS callsign per family member) -->
  <dialog id="manageDialog" class="manage-dialog">
    <form method="dialog" id="manageForm">
      <h3>Manage family profiles</h3>
      <p class="hint">A callsign lets Conflux match APRS beacons to a person. Base
        call or with SSID, e.g. <code>KE0ABC</code> or <code>KE0ABC-9</code>.</p>
      <div id="manageList"></div>
      <hr />
      <div class="add-row">
        <input id="addName" placeholder="Add person (name)" maxlength="80" />
        <input id="addCallsign" placeholder="Callsign (optional)" maxlength="16" />
        <button type="button" class="primary" id="addBtn">Add</button>
      </div>
      <p class="manage-err" id="manageErr"></p>
      <menu>
        <button value="close" type="submit">Done</button>
      </menu>
    </form>
  </dialog>

  <script src="/hub/vendor/leaflet.js"></script>
  <script src="/hub/app.js"></script>
</body>
</html>
